name: Deploy to Koyeb and Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Koyeb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21' # Matches your Dockerfile configuration
          cache: 'maven'

      - name: Run Backend Tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test 

      - name: Install Koyeb CLI
        run: curl https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          # This triggers a redeploy of the existing service we set up in the dashboard
          ~/bin/koyeb service redeploy doctor-appointment-booking-application

      - name: Deployment Complete
        run: echo "✅ Backend deployed to Koyeb"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Expo Web
        run: |
          cd frontend
          # Using your custom build script to trigger post-export.js
          npm run build 

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
           npm install -g vercel@latest
           cd frontend
           # Upload the 'dist' folder which now has the /assets/vendor/ fix
           vercel deploy ./dist --prod --token=$VERCEL_TOKEN --yes   
      
      - name: Deployment Complete
        run: echo "✅ Frontend deployed to Vercel"