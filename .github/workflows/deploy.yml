name: Deploy to Koyeb and Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Koyeb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Run Backend Tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test

      - name: Install Koyeb CLI
        run: |
          # Manually download and install to a global PATH location
          curl -L https://github.com/koyeb/koyeb-cli/releases/latest/download/koyeb-linux-amd64 -o koyeb
          chmod +x koyeb
          sudo mv koyeb /usr/local/bin/koyeb

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          # Using the confirmed app/service names: logical-daryn/doctor-appointment-booking-application
          koyeb service redeploy logical-daryn/doctor-appointment-booking-application

      - name: Deployment Complete
        run: echo "✅ Backend deployed to Koyeb"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Build Expo Web
        run: |
          cd frontend
          # CRITICAL: This runs 'expo export' AND your 'post-export.js' renaming logic
          npm run build 

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
           npm install -g vercel@latest
           cd frontend
           # Upload the 'dist' folder which now has the vendor assets fix
           vercel deploy ./dist --prod --token=$VERCEL_TOKEN --yes

      - name: Deployment Complete
        run: echo "✅ Frontend deployed to Vercel"