name: Deploy to Koyeb and Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Koyeb
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"

      - name: Run Backend Tests
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw test

      - name: Install Koyeb CLI
        run: |
          # Use the official installer
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          # Add the install directory to the GitHub Actions PATH
          echo "$HOME/.koyeb/bin" >> $GITHUB_PATH

      - name: Deploy to Koyeb
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          # Now 'koyeb' will be found because we updated the PATH above
          koyeb service redeploy logical-daryn/doctor-appointment-booking-application

      - name: Deployment Complete
        run: echo "✅ Backend deployed to Koyeb"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
           npm install -g vercel@latest
           cd frontend
           # First, safely link the project inside the action container
           vercel pull --yes --environment=production --token=$VERCEL_TOKEN
           # Second, securely run the Vercel Build Step locally (which triggers our npm run build and packaging)
           vercel build --prod --token=$VERCEL_TOKEN
           # Finally, upload exactly the compiled Vercel Output API securely to production
           vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --yes

      - name: Deployment Complete
        run: echo "✅ Frontend deployed to Vercel"