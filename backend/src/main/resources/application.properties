# Server Configuration
# Railway provides the PORT variable automatically
server.port=${PORT:8080}

# Database Configuration
# These variables will be set in the Railway Dashboard
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
# Use 'update' for safety, or 'none' if you manage migrations manually
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Let Hibernate detect the dialect automatically to avoid the version warning you saw
# spring.jpa.properties.hibernate.dialect is removed to avoid version conflicts